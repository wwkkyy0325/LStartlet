[tool:pytest]
# 测试目录配置
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出配置
addopts = 
    --strict-markers
    --strict-config  
    --tb=short
    -v
    --color=yes
    --disable-warnings

# 忽略的目录
norecursedirs = .git .venv venv build dist *.egg-info

# 注册自定义标记
markers =
    unit: 单元测试
    integration: 集成测试  
    slow: 慢速测试
    decorator: 装饰器相关测试

# 环境变量配置
env = 
    PYTHONPATH=f:\workspace-new\python\LStartlet\src