name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [published]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install system dependencies
      run: |
        # Install Microsoft Visual C++ Build Tools for Windows
        choco install visualcpp-build-tools -y
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        
        # Install common libraries for testing
        pip install numpy scipy pandas
        pip install opencv-python pillow scikit-image
    
    - name: Run tests
      run: |
        python tests/run_tests.py
    
    - name: Run code formatting check
      continue-on-error: true
      run: |
        python -m black --check --fast . --diff
    
    - name: Run type checking
      continue-on-error: true
      if: matrix.python-version == '3.9'  # Only run type checking on Python 3.9 to save time
      run: |
        python -m mypy core plugin tests --ignore-missing-imports

  build:
    needs: test
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.9"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install build twine wheel setuptools
    
    - name: Build package
      run: |
        python -m build
    
    - name: Check package metadata
      run: |
        twine check dist/*
    
    - name: Publish to PyPI
      if: github.event_name == 'release'
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        twine upload dist/*