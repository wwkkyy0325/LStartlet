name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [published]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install system dependencies
      run: |
        # Install Microsoft Visual C++ Build Tools for Windows
        choco install visualcpp-build-tools -y
    
    - name: Install tox
      run: |
        python -m pip install --upgrade pip
        pip install tox
    
    - name: Run tests with tox
      shell: bash
      run: |
        # Remove dots from python version to match tox env names (e.g., 3.10 -> 310)
        PYTHON_VERSION_NO_DOTS=${{ matrix.python-version }}  
        PYTHON_VERSION_NO_DOTS=${PYTHON_VERSION_NO_DOTS//./}
        tox -e py$PYTHON_VERSION_NO_DOTS

  code-quality:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    
    - name: Install system dependencies
      run: |
        # Install Microsoft Visual C++ Build Tools for Windows
        choco install visualcpp-build-tools -y
    
    - name: Install tox
      run: |
        python -m pip install --upgrade pip
        pip install tox
    
    - name: Run code quality checks
      run: |
        tox -e lint,type

  build-and-publish:
    needs: [test, code-quality]
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    
    - name: Install system dependencies
      run: |
        # Install Microsoft Visual C++ Build Tools for Windows
        choco install visualcpp-build-tools -y
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    
    - name: Build package
      run: python -m build
    
    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        twine upload dist/*